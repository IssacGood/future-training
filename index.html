<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NQ Futures Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf0;--muted:#6b7280;--dim:#3d4455;
  --up:#00d4a0;--dn:#ff4d6d;
  --up2:rgba(0,212,160,0.13);--dn2:rgba(255,77,109,0.13);
  --accent:#4f8ef7;--gold:#f59e0b;--purple:#a78bfa;
  --mono:'IBM Plex Mono',monospace;--sans:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;-webkit-tap-highlight-color:transparent;}
body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;}

/* ── Desktop grid ── */
.app{display:grid;grid-template-rows:52px 1fr 40px;grid-template-columns:1fr 256px;height:100dvh;}
.header{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 14px;border-bottom:1px solid var(--border);background:var(--bg2);z-index:10;min-width:0;}
.chart-wrap{grid-row:2;grid-column:1;position:relative;overflow:hidden;background:var(--bg);min-width:0;}
.sidebar{grid-row:2;grid-column:2;display:flex;flex-direction:column;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;}
.statusbar{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 14px;border-top:1px solid var(--border);background:var(--bg2);font-family:var(--mono);font-size:10px;color:var(--muted);overflow:hidden;}

/* ── Mobile overrides ── */
@media(max-width:640px){
  .app{grid-template-rows:auto 1fr auto auto;grid-template-columns:1fr;height:100dvh;}
  .header{grid-column:1;flex-wrap:wrap;row-gap:4px;padding:8px 10px;height:auto;}
  .chart-wrap{grid-row:2;grid-column:1;}
  .sidebar{grid-row:3;grid-column:1;border-left:none;border-top:1px solid var(--border);overflow:hidden;}
  .statusbar{grid-row:4;grid-column:1;height:30px;font-size:10px;padding:0 10px;}
  .hide-m{display:none!important;}
  .sblock{padding:9px 10px 8px;}
}

/* Header */
.logo{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.08em;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--up);box-shadow:0 0 7px var(--up);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.price-big{font-family:var(--mono);font-size:18px;font-weight:600;white-space:nowrap;}
.chip{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.chip.up{background:var(--up2);color:var(--up);}
.chip.dn{background:var(--dn2);color:var(--dn);}
.ohlc{display:flex;gap:10px;font-family:var(--mono);font-size:10px;color:var(--muted);flex-wrap:wrap;}
.ohlc b{color:var(--text);font-weight:500;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0;}

/* Buttons */
.btn{cursor:pointer;border:1px solid var(--border2);border-radius:6px;padding:5px 11px;font-size:12px;font-family:var(--sans);background:transparent;color:var(--text);transition:all .14s;white-space:nowrap;}
.btn:active{transform:scale(.96);}
.btn-up{border-color:var(--up);color:var(--up);}
.btn-up:active{background:var(--up2);}
.btn-dn{border-color:var(--dn);color:var(--dn);}
.btn-dn:active{background:var(--dn2);}
.btn-gold{border-color:var(--gold);color:var(--gold);}
.btn-gold:active{background:rgba(245,158,11,.12);}
.btn-acc{border-color:var(--accent);color:var(--accent);}
select.btn{padding:5px 6px;}

/* Canvas */
#chartCanvas,#markCanvas{display:block;position:absolute;top:0;left:0;}
#markCanvas{pointer-events:none;}

/* Tooltip */
#tip{position:absolute;background:#1e2330;border:1px solid var(--border2);border-radius:6px;padding:7px 11px;font-family:var(--mono);font-size:10px;pointer-events:none;display:none;z-index:20;line-height:1.8;min-width:110px;}

/* Sidebar blocks */
.sblock{padding:12px 14px 10px;border-bottom:1px solid var(--border);}
.sblock-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;font-weight:500;}

/* Collapsible panel (mobile) */
.panel-header{
  display:none;
  align-items:center;justify-content:space-between;
  padding:10px 12px;cursor:pointer;user-select:none;
  background:var(--bg2);border-bottom:1px solid var(--border);
}
.panel-header-left{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);}
.panel-arrow{font-size:11px;color:var(--muted);transition:transform .2s;}
.panel-arrow.open{transform:rotate(180deg);}
.panel-body{overflow:hidden;transition:max-height .25s ease;}
@media(max-width:640px){
  .panel-header{display:flex;}
  .panel-body{max-height:0;}
  .panel-body.open{max-height:600px;}
}

/* Position card */
.pos-card{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px 12px;}
.pos-dir.long{color:var(--up);}
.pos-dir.short{color:var(--dn);}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.stat-card{background:var(--bg3);border-radius:6px;padding:7px 10px;}
.stat-label{font-size:10px;color:var(--muted);margin-bottom:2px;}
.stat-val{font-family:var(--mono);font-size:13px;font-weight:500;}

/* Log */
.log-list{display:flex;flex-direction:column;gap:3px;max-height:130px;overflow-y:auto;}
.log-item{font-family:var(--mono);font-size:10px;padding:4px 8px;border-radius:4px;display:flex;justify-content:space-between;}
.log-item.win{background:var(--up2);color:var(--up);}
.log-item.loss{background:var(--dn2);color:var(--dn);}
.log-empty{font-size:11px;color:var(--dim);text-align:center;padding:14px 0;}

/* Tags */
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:11px;padding:3px 9px;border-radius:3px;cursor:pointer;border:1px solid var(--border2);color:var(--muted);transition:all .14s;}
.tag.active{background:rgba(167,139,250,.15);border-color:var(--purple);color:var(--purple);}

/* Indicator toggles */
.ind-row{display:flex;gap:5px;flex-wrap:wrap;}
.ind-btn{font-size:11px;font-family:var(--mono);padding:3px 9px;border-radius:3px;cursor:pointer;border:1px solid;transition:all .14s;}
.ind-btn.off{opacity:.3;}

/* Mobile bottom bar */
.trade-bar{display:none;}
@media(max-width:640px){
  .trade-bar{display:flex;gap:6px;padding:8px 10px;background:var(--bg2);border-top:1px solid var(--border);}
  .trade-bar .btn{flex:1;padding:11px 4px;font-size:13px;text-align:center;}
  .desk-trade{display:none!important;}
}

/* Notification */
#notif{position:fixed;top:10px;left:50%;transform:translateX(-50%) translateY(-10px);z-index:100;font-family:var(--mono);font-size:12px;padding:9px 18px;border-radius:7px;border:1px solid;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;max-width:92vw;text-align:center;}
#notif.show{opacity:1;transform:translateX(-50%) translateY(0);}
#notif.win{background:var(--up2);border-color:var(--up);color:var(--up);}
#notif.loss{background:var(--dn2);border-color:var(--dn);color:var(--dn);}
#notif.info{background:rgba(79,142,247,.12);border-color:var(--accent);color:var(--accent);}

/* Zoom hint badge */
#zoomBadge{position:absolute;top:8px;left:8px;background:rgba(79,142,247,.18);border:1px solid rgba(79,142,247,.3);border-radius:4px;font-family:var(--mono);font-size:10px;color:var(--accent);padding:3px 8px;pointer-events:none;opacity:0;transition:opacity .3s;}
#zoomBadge.show{opacity:1;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<header class="header">
  <div class="logo"><span class="logo-dot"></span>NQ TRAINER</div>
  <div class="price-big" id="hPrice">—</div>
  <div class="chip" id="hChip">—</div>
  <div class="ohlc hide-m">
    <span>O <b id="hO">—</b></span>
    <span>H <b id="hH" style="color:var(--up)">—</b></span>
    <span>L <b id="hL" style="color:var(--dn)">—</b></span>
    <span>C <b id="hC">—</b></span>
    <span style="color:var(--dim)">|</span>
    <span>K <b id="hBar">0</b></span>
  </div>
  <div class="hdr-right">
    <select class="btn" id="speedSel">
      <option value="900">慢</option>
      <option value="450" selected>正常</option>
      <option value="180">快</option>
      <option value="60">極快</option>
    </select>
    <button class="btn" id="playBtn" onclick="togglePlay()">▶</button>
    <button class="btn btn-acc hide-m" onclick="stepOne()">+1K</button>
    <button class="btn" onclick="newSession()">↺</button>
  </div>
</header>

<!-- CHART -->
<div class="chart-wrap" id="chartWrap">
  <canvas id="chartCanvas"></canvas>
  <canvas id="markCanvas"></canvas>
  <div id="tip"></div>
  <div id="zoomBadge"></div>
</div>

<!-- MOBILE TRADE BAR (always visible bottom) -->
<div class="trade-bar">
  <button class="btn btn-up" onclick="openTrade('long')">▲ 做多</button>
  <button class="btn btn-dn" onclick="openTrade('short')">▼ 做空</button>
  <button class="btn btn-gold" id="closeBtnM" style="display:none;flex:1;" onclick="closeTrade()">✕ 平倉</button>
  <button class="btn" onclick="stepOne()" style="flex:0;padding:11px 10px;">+1K</button>
  <button class="btn btn-acc" onclick="addMark('B')" style="flex:0;padding:11px 10px;">📌</button>
</div>

<!-- SIDEBAR -->
<aside class="sidebar">

  <!-- Desktop: trade buttons -->
  <div class="sblock desk-trade">
    <div class="sblock-title">進場 / 出場</div>
    <div style="display:flex;gap:6px;margin-bottom:7px;">
      <button class="btn btn-up" style="flex:1;padding:9px;font-size:13px;" onclick="openTrade('long')">▲ 做多</button>
      <button class="btn btn-dn" style="flex:1;padding:9px;font-size:13px;" onclick="openTrade('short')">▼ 做空</button>
    </div>
    <button class="btn btn-gold" id="closeBtn" style="width:100%;display:none;" onclick="closeTrade()">✕ 平倉</button>
    <div id="posCard" style="display:none;margin-top:8px;">
      <div class="pos-card">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span class="pos-dir" id="posDir" style="font-family:var(--mono);font-size:11px;font-weight:600;">—</span>
          <span style="font-size:10px;color:var(--muted);font-family:var(--mono);" id="posEntry">@—</span>
        </div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px;" id="posDetail">持倉中...</div>
        <div style="font-family:var(--mono);font-size:17px;font-weight:600;margin-top:4px;" id="posPnl">+0</div>
      </div>
    </div>
  </div>

  <!-- Mobile: position indicator (slim) -->
  <div id="posCardM" style="display:none;padding:7px 10px;background:var(--bg3);border-bottom:1px solid var(--border);">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span class="pos-dir" id="posDirM" style="font-family:var(--mono);font-size:11px;font-weight:600;">—</span>
      <span style="font-size:10px;color:var(--muted);font-family:var(--mono);" id="posEntryM">@—</span>
      <div style="font-family:var(--mono);font-size:15px;font-weight:600;" id="posPnlM">+0</div>
    </div>
  </div>

  <!-- COLLAPSIBLE PANEL (mobile tap to expand) -->
  <div class="panel-header" onclick="togglePanel()">
    <div class="panel-header-left">
      <span>⚙</span>
      <span>指標 / 標記 / 績效</span>
      <span id="panelSummary" style="font-family:var(--mono);font-size:10px;color:var(--accent);"></span>
    </div>
    <span class="panel-arrow" id="panelArrow">▼</span>
  </div>
  <div class="panel-body" id="panelBody">

    <!-- Indicators -->
    <div class="sblock">
      <div class="sblock-title">指標</div>
      <div class="ind-row">
        <div class="ind-btn" style="color:#f59e0b;border-color:#f59e0b;" data-type="ma" data-p="5" onclick="toggleInd(this)">MA5</div>
        <div class="ind-btn" style="color:#a78bfa;border-color:#a78bfa;" data-type="ma" data-p="10" onclick="toggleInd(this)">MA10</div>
        <div class="ind-btn off" style="color:#4f8ef7;border-color:#4f8ef7;" data-type="ma" data-p="20" onclick="toggleInd(this)">MA20</div>
        <div class="ind-btn off" style="color:#00d4a0;border-color:#00d4a0;" data-type="ma" data-p="60" onclick="toggleInd(this)">MA60</div>
        <div class="ind-btn off" style="color:#f472b6;border-color:#f472b6;" data-type="bb" onclick="toggleInd(this)">BBand</div>
      </div>
      <div id="bbSettings" style="display:none;margin-top:8px;font-size:11px;color:var(--muted);display:none;">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span>週期</span>
          <input type="number" id="bbPeriod" value="20" min="5" max="50" style="width:46px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:11px;padding:2px 5px;" onchange="draw()">
          <span>倍數</span>
          <input type="number" id="bbMult" value="2" min="1" max="4" step="0.5" style="width:40px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:11px;padding:2px 5px;" onchange="draw()">
        </div>
      </div>
    </div>

    <!-- K count -->
    <div class="sblock">
      <div class="sblock-title">顯示K線數</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="visRange" min="20" max="150" value="60" style="flex:1;"
          oninput="setVis(this.value)">
        <span style="font-family:var(--mono);font-size:12px;min-width:32px;" id="visLabel">60</span>
      </div>
      <div style="font-size:10px;color:var(--dim);margin-top:4px;">電腦：滾輪縮放｜手機：雙指捏合</div>
    </div>

    <!-- Pattern tags -->
    <div class="sblock">
      <div class="sblock-title">標記型態 <span style="font-size:9px;color:var(--dim);font-weight:400;">（先選型態，再按買/賣點）</span></div>
      <div class="tags-wrap" style="margin-bottom:8px;">
        <div class="tag" onclick="selTag(this,'破底翻')">破底翻</div>
        <div class="tag" onclick="selTag(this,'假突破')">假突破</div>
        <div class="tag" onclick="selTag(this,'多頭排列')">多頭排列</div>
        <div class="tag" onclick="selTag(this,'空頭排列')">空頭排列</div>
        <div class="tag" onclick="selTag(this,'箱型整理')">箱型整理</div>
        <div class="tag" onclick="selTag(this,'趨勢反轉')">趨勢反轉</div>
        <div class="tag" onclick="selTag(this,'紅K突破')">紅K突破</div>
        <div class="tag" onclick="selTag(this,'吞噬')">吞噬</div>
      </div>
      <div style="display:flex;gap:5px;">
        <button class="btn" style="flex:1;font-size:11px;" onclick="addMark('B')">📌 買點</button>
        <button class="btn" style="flex:1;font-size:11px;" onclick="addMark('S')">📌 賣點</button>
        <button class="btn" style="color:var(--muted);font-size:11px;" onclick="clearMarks()">清除</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="sblock">
      <div class="sblock-title">績效</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">累積損益</div><div class="stat-val" id="sTotalPnl" style="color:var(--up)">+0</div></div>
        <div class="stat-card"><div class="stat-label">勝率</div><div class="stat-val" id="sWinRate">—</div></div>
        <div class="stat-card"><div class="stat-label">次數</div><div class="stat-val" id="sCount">0</div></div>
        <div class="stat-card"><div class="stat-label">最大獲利</div><div class="stat-val" id="sBest" style="color:var(--up)">—</div></div>
        <div class="stat-card"><div class="stat-label">最大虧損</div><div class="stat-val" id="sWorst" style="color:var(--dn)">—</div></div>
        <div class="stat-card"><div class="stat-label">平均K數</div><div class="stat-val" id="sAvgBar">—</div></div>
      </div>
    </div>

    <!-- Log -->
    <div class="sblock">
      <div class="sblock-title">交易記錄</div>
      <div class="log-list" id="logList">
        <div class="log-empty">尚無交易記錄</div>
      </div>
    </div>

  </div><!-- /panel-body -->
</aside>

<!-- STATUSBAR -->
<footer class="statusbar">
  <span id="sbMsg">就緒 — 按 ▶ 播放</span>
  <span style="margin-left:auto;color:var(--dim);flex-shrink:0;" class="hide-m">模擬練習，非真實交易</span>
</footer>
</div><!-- /app -->

<div id="notif"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let candles=[], vis_count=60, vis=0, playing=false, timer=null;
let pos=null, totalPnl=0, trades=[], markers=[];
let selectedTag=null;
let indOn={ma5:true,ma10:true,ma20:false,ma60:false,bb:false};
const maColors={5:'#f59e0b',10:'#a78bfa',20:'#4f8ef7',60:'#00d4a0'};
let panelOpen=false;

const wrap=document.getElementById('chartWrap');
const canvas=document.getElementById('chartCanvas');
const mCanvas=document.getElementById('markCanvas');
const ctx=canvas.getContext('2d');
const mCtx=mCanvas.getContext('2d');

function isMob(){return window.innerWidth<=640;}

// ── Collapsible panel ──────────────────────────────────────────────────────
function togglePanel(){
  panelOpen=!panelOpen;
  document.getElementById('panelBody').classList.toggle('open',panelOpen);
  document.getElementById('panelArrow').classList.toggle('open',panelOpen);
}

// ── Zoom (vis_count) ───────────────────────────────────────────────────────
function setVis(n){
  vis_count=Math.max(20,Math.min(150,Math.round(n)));
  document.getElementById('visRange').value=vis_count;
  document.getElementById('visLabel').textContent=vis_count;
  showZoomBadge();
  draw();
}

let zoomT=null;
function showZoomBadge(){
  const b=document.getElementById('zoomBadge');
  b.textContent=vis_count+' 根K';
  b.classList.add('show');
  clearTimeout(zoomT);
  zoomT=setTimeout(()=>b.classList.remove('show'),1200);
}

// Mouse wheel zoom
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const delta=e.deltaY>0?5:-5;
  setVis(vis_count+delta);
},{passive:false});

// Pinch zoom (touch)
let lastPinchDist=null;
wrap.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    lastPinchDist=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
  }
},{passive:true});
wrap.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&lastPinchDist!==null){
    e.preventDefault();
    const dist=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
    const ratio=lastPinchDist/dist;
    setVis(Math.round(vis_count*ratio));
    lastPinchDist=dist;
  }
},{passive:false});
wrap.addEventListener('touchend',()=>{lastPinchDist=null;},{passive:true});

// ── Data gen ───────────────────────────────────────────────────────────────
function genSession(){
  let p=16000+Math.random()*5000;
  const regs=['trend_up','trend_dn','range','volatile'];
  let reg='range',rem=0,out=[];
  for(let i=0;i<320;i++){
    if(rem<=0){reg=regs[Math.floor(Math.random()*4)];rem=18+Math.floor(Math.random()*45);}
    rem--;
    let bias=0,vol=60;
    if(reg==='trend_up'){bias=.55;vol=52;}
    else if(reg==='trend_dn'){bias=-.55;vol=52;}
    else if(reg==='volatile'){vol=135;bias=(Math.random()-.5)*.3;}
    else{bias=(Math.random()-.5)*.08;vol=42;}
    const body=(Math.random()-.5+bias*.4)*vol*1.6;
    const wT=Math.random()*vol*.7,wB=Math.random()*vol*.7;
    const o=p,c=o+body,h=Math.max(o,c)+wT,l=Math.min(o,c)-wB;
    p=c+(Math.random()-.5)*3;
    out.push({o:+o.toFixed(1),h:+h.toFixed(1),l:+l.toFixed(1),c:+c.toFixed(1)});
  }
  return out;
}

// ── Bollinger Bands ────────────────────────────────────────────────────────
function calcBB(data,period,mult){
  return data.map((_,i)=>{
    if(i<period-1)return null;
    const slice=data.slice(i-period+1,i+1).map(d=>d.c);
    const mean=slice.reduce((a,b)=>a+b,0)/period;
    const std=Math.sqrt(slice.reduce((a,b)=>a+(b-mean)**2,0)/period);
    return{mid:mean,upper:mean+mult*std,lower:mean-mult*std};
  });
}

// ── Resize ─────────────────────────────────────────────────────────────────
function resize(){
  const W=wrap.clientWidth,H=wrap.clientHeight;
  canvas.width=mCanvas.width=W;
  canvas.height=mCanvas.height=H;
  draw();
}

// ── Scale ──────────────────────────────────────────────────────────────────
function getSlice(){
  const start=Math.max(0,vis-vis_count);
  return{slice:candles.slice(start,vis),start};
}
function getScale(slice){
  const mob=isMob();
  const pad={top:mob?28:32,right:mob?50:54,bottom:mob?24:28,left:6};
  const W=canvas.width,H=canvas.height;
  const cW=W-pad.left-pad.right,cH=H-pad.top-pad.bottom;

  // include BB in price range if on
  let allH=slice.map(c=>c.h),allL=slice.map(c=>c.l);
  if(indOn.bb&&candles.length){
    const period=parseInt(document.getElementById('bbPeriod').value)||20;
    const mult=parseFloat(document.getElementById('bbMult').value)||2;
    const bb=calcBB(candles,period,mult);
    const{start}=getSlice();
    slice.forEach((_,i)=>{
      const b=bb[start+i];
      if(b){allH.push(b.upper);allL.push(b.lower);}
    });
  }
  const maxP=Math.max(...allH),minP=Math.min(...allL);
  const rng=maxP-minP||200,ext=rng*.1;
  const yMax=maxP+ext,yMin=minP-ext;
  const toY=p=>pad.top+((yMax-p)/(yMax-yMin))*cH;
  const xStep=cW/vis_count;
  const toX=i=>pad.left+(vis_count-slice.length+i)*xStep+xStep/2;
  const cw=Math.max(1,Math.min(mob?9:13,xStep*.72));
  return{W,H,cW,cH,yMax,yMin,toY,xStep,toX,cw,pad};
}

// ── Draw ───────────────────────────────────────────────────────────────────
function draw(){
  if(!candles.length||!vis)return;
  const{slice,start}=getSlice();
  if(!slice.length)return;
  const sc=getScale(slice);
  const{W,H,cH,yMax,yMin,toY,xStep,toX,cw,pad}=sc;
  ctx.clearRect(0,0,W,H);

  // grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=.5;
  for(let i=0;i<=5;i++){
    const y=pad.top+(cH/5)*i;
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
    const pr=yMax-((yMax-yMin)/5)*i;
    ctx.fillStyle='#3d4455';ctx.font=`${isMob()?9:10}px IBM Plex Mono,monospace`;
    ctx.textAlign='right';ctx.fillText(pr.toFixed(0),W-4,y+3.5);
  }

  // Bollinger Bands
  if(indOn.bb){
    const period=parseInt(document.getElementById('bbPeriod').value)||20;
    const mult=parseFloat(document.getElementById('bbMult').value)||2;
    const bb=calcBB(candles,period,mult);

    // fill band
    ctx.beginPath();
    let firstValid=true;
    slice.forEach((_,i)=>{
      const b=bb[start+i];if(!b)return;
      if(firstValid){ctx.moveTo(toX(i),toY(b.upper));firstValid=false;}
      else ctx.lineTo(toX(i),toY(b.upper));
    });
    const sliceRev=[...slice].map((_,i)=>slice.length-1-i);
    sliceRev.forEach(i=>{
      const b=bb[start+i];if(!b)return;
      ctx.lineTo(toX(i),toY(b.lower));
    });
    ctx.closePath();
    ctx.fillStyle='rgba(244,114,182,0.05)';ctx.fill();

    // upper line
    ctx.strokeStyle='rgba(244,114,182,0.5)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();let s1=true;
    slice.forEach((_,i)=>{const b=bb[start+i];if(!b)return;if(s1){ctx.moveTo(toX(i),toY(b.upper));s1=false;}else ctx.lineTo(toX(i),toY(b.upper));});
    ctx.stroke();

    // mid line (SMA)
    ctx.strokeStyle='rgba(244,114,182,0.7)';ctx.lineWidth=1;ctx.setLineDash([5,3]);
    ctx.beginPath();let s2=true;
    slice.forEach((_,i)=>{const b=bb[start+i];if(!b)return;if(s2){ctx.moveTo(toX(i),toY(b.mid));s2=false;}else ctx.lineTo(toX(i),toY(b.mid));});
    ctx.stroke();

    // lower line
    ctx.strokeStyle='rgba(244,114,182,0.5)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();let s3=true;
    slice.forEach((_,i)=>{const b=bb[start+i];if(!b)return;if(s3){ctx.moveTo(toX(i),toY(b.lower));s3=false;}else ctx.lineTo(toX(i),toY(b.lower));});
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // MA lines
  [{key:'ma5',p:5},{key:'ma10',p:10},{key:'ma20',p:20},{key:'ma60',p:60}].forEach(({key,p})=>{
    if(!indOn[key])return;
    ctx.strokeStyle=maColors[p];ctx.lineWidth=1.2;ctx.globalAlpha=.75;
    ctx.beginPath();let started=false;
    slice.forEach((_,i)=>{
      const ai=start+i;if(ai<p-1)return;
      const ma=candles.slice(ai-p+1,ai+1).reduce((a,b)=>a+b.c,0)/p;
      const x=toX(i),y=toY(ma);
      if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);
    });
    ctx.stroke();ctx.globalAlpha=1;
  });

  // candles
  slice.forEach((c,i)=>{
    const x=toX(i),isUp=c.c>=c.o,color=isUp?'#00d4a0':'#ff4d6d';
    ctx.strokeStyle=color;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,toY(c.h));ctx.lineTo(x,toY(c.l));ctx.stroke();
    const oY=toY(c.o),cY=toY(c.c),bTop=Math.min(oY,cY),bH=Math.max(1.5,Math.abs(oY-cY));
    if(isUp){ctx.fillStyle=color;ctx.fillRect(x-cw/2,bTop,cw,bH);}
    else{ctx.fillStyle='rgba(255,77,109,0.14)';ctx.fillRect(x-cw/2,bTop,cw,bH);ctx.strokeRect(x-cw/2,bTop,cw,bH);}
  });

  // entry line
  if(pos){
    const eY=toY(pos.price),col=pos.dir==='long'?'#00d4a0':'#ff4d6d';
    ctx.setLineDash([5,4]);ctx.strokeStyle=col;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.left,eY);ctx.lineTo(W-pad.right,eY);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=pos.dir==='long'?'rgba(0,212,160,.14)':'rgba(255,77,109,.14)';
    ctx.fillRect(W-pad.right+2,eY-9,50,16);
    ctx.fillStyle=col;ctx.font='10px IBM Plex Mono,monospace';ctx.textAlign='left';
    ctx.fillText((pos.dir==='long'?'▲':'▼')+pos.price.toFixed(0),W-pad.right+5,eY+3);
  }

  // last price pill
  const last=candles[vis-1],lastY=toY(last.c),isLastUp=last.c>=last.o;
  ctx.fillStyle=isLastUp?'rgba(0,212,160,.9)':'rgba(255,77,109,.9)';
  ctx.fillRect(W-pad.right+2,lastY-8,50,15);
  ctx.fillStyle='#0d0f14';ctx.font='bold 9px IBM Plex Mono,monospace';
  ctx.textAlign='left';ctx.fillText(last.c.toFixed(0),W-pad.right+5,lastY+3);

  drawMarkers(slice,start,sc);
}

function drawMarkers(slice,start,sc){
  const{toX,toY}=sc;
  mCtx.clearRect(0,0,mCanvas.width,mCanvas.height);
  markers.forEach(m=>{
    const i=m.idx-start;
    if(i<0||i>=slice.length)return;
    const c=candles[m.idx],x=toX(i);
    if(m.type==='B'){
      const y=toY(c.l)+4;
      mCtx.fillStyle='#a78bfa';
      mCtx.beginPath();mCtx.moveTo(x,y);mCtx.lineTo(x-5,y+11);mCtx.lineTo(x+5,y+11);mCtx.closePath();mCtx.fill();
      mCtx.fillStyle='#a78bfa';mCtx.font='9px DM Sans,sans-serif';mCtx.textAlign='center';
      mCtx.fillText(m.label||'B',x,y+21);
    }else{
      const y=toY(c.h)-4;
      mCtx.fillStyle='#f59e0b';
      mCtx.beginPath();mCtx.moveTo(x,y);mCtx.lineTo(x-5,y-11);mCtx.lineTo(x+5,y-11);mCtx.closePath();mCtx.fill();
      mCtx.fillStyle='#f59e0b';mCtx.font='9px DM Sans,sans-serif';mCtx.textAlign='center';
      mCtx.fillText(m.label||'S',x,y-15);
    }
  });
}

// ── Header update ──────────────────────────────────────────────────────────
function updateHeader(){
  if(!vis)return;
  const c=candles[vis-1],prev=vis>1?candles[vis-2]:c;
  document.getElementById('hPrice').textContent=c.c.toFixed(1);
  document.getElementById('hO').textContent=c.o.toFixed(1);
  document.getElementById('hH').textContent=c.h.toFixed(1);
  document.getElementById('hL').textContent=c.l.toFixed(1);
  document.getElementById('hC').textContent=c.c.toFixed(1);
  document.getElementById('hBar').textContent=vis;
  const chg=c.c-prev.c,pct=(chg/prev.c*100).toFixed(2);
  const chip=document.getElementById('hChip');
  chip.textContent=(chg>=0?'+':'')+chg.toFixed(1)+'('+pct+'%)';
  chip.className='chip '+(chg>=0?'up':'dn');
  if(pos){
    const pnl=pos.dir==='long'?c.c-pos.price:pos.price-c.c;
    const str=(pnl>=0?'+':'')+pnl.toFixed(1)+' pts';
    ['posPnl','posPnlM'].forEach(id=>{
      const el=document.getElementById(id);
      if(el){el.textContent=str;el.style.color=pnl>=0?'var(--up)':'var(--dn)';}
    });
    const det=document.getElementById('posDetail');
    if(det)det.textContent='@'+pos.price.toFixed(1)+' | '+(vis-pos.startBar)+'根K';
  }
}

// ── Play ───────────────────────────────────────────────────────────────────
function togglePlay(){
  if(vis>=candles.length){notify('行情走完，按 ↺ 開新行情','info');return;}
  playing=!playing;
  document.getElementById('playBtn').textContent=playing?'⏸':'▶';
  if(playing){
    const spd=parseInt(document.getElementById('speedSel').value);
    timer=setInterval(()=>{
      if(vis<candles.length){vis++;draw();updateHeader();}
      else{clearInterval(timer);playing=false;document.getElementById('playBtn').textContent='▶';sbMsg('行情走完！按 ↺ 繼續練習');}
    },spd);
  }else clearInterval(timer);
}
function stepOne(){if(vis<candles.length){vis++;draw();updateHeader();}}

// ── Session ────────────────────────────────────────────────────────────────
function newSession(){
  clearInterval(timer);playing=false;
  candles=genSession();vis=22;markers=[];
  document.getElementById('playBtn').textContent='▶';
  pos=null;
  ['closeBtn','closeBtnM'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  ['posCard','posCardM'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  draw();updateHeader();
  sbMsg('新行情！找到進場點後按 ▲做多 / ▼做空');
}

// ── Trade ──────────────────────────────────────────────────────────────────
function openTrade(dir){
  if(pos){notify('請先平倉','info');return;}
  if(!vis)return;
  const price=candles[vis-1].c;
  pos={dir,price,startBar:vis};
  ['closeBtn','closeBtnM'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='';});
  ['posCard','posCardM'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='';});
  const label=dir==='long'?'▲ 多單':'▼ 空單';
  ['posDir','posDirM'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent=label;el.className='pos-dir '+dir;}});
  ['posEntry','posEntryM'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent='@'+price.toFixed(1);});
  sbMsg((dir==='long'?'▲ 做多':'▼ 做空')+' 進場 @ '+price.toFixed(1));
  draw();
}

function closeTrade(){
  if(!pos)return;
  const price=candles[vis-1].c;
  const pnl=pos.dir==='long'?price-pos.price:pos.price-price;
  totalPnl+=pnl;
  const bars=vis-pos.startBar;
  trades.push({dir:pos.dir,entry:pos.price,exit:price,pnl,bars});
  addLog(trades[trades.length-1]);
  pos=null;
  ['closeBtn','closeBtnM'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  ['posCard','posCardM'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  updateStats();
  notify((pnl>=0?'✓ 獲利 +':'✗ 虧損 ')+pnl.toFixed(1)+' 點 ('+bars+'根K)',pnl>=0?'win':'loss');
  draw();
}

function addLog(t){
  const list=document.getElementById('logList');
  const empty=list.querySelector('.log-empty');
  if(empty)empty.remove();
  const el=document.createElement('div');
  el.className='log-item '+(t.pnl>=0?'win':'loss');
  el.innerHTML=`<span>${t.dir==='long'?'▲':'▼'} ${t.entry.toFixed(0)}→${t.exit.toFixed(0)}</span><span>${(t.pnl>=0?'+':'')+t.pnl.toFixed(1)}</span>`;
  list.prepend(el);
}

function updateStats(){
  const el=document.getElementById('sTotalPnl');
  el.textContent=(totalPnl>=0?'+':'')+totalPnl.toFixed(1);
  el.style.color=totalPnl>=0?'var(--up)':'var(--dn)';
  document.getElementById('sCount').textContent=trades.length;
  if(trades.length){
    const wins=trades.filter(t=>t.pnl>=0).length;
    document.getElementById('sWinRate').textContent=Math.round(wins/trades.length*100)+'%';
    const pnls=trades.map(t=>t.pnl);
    document.getElementById('sBest').textContent='+'+Math.max(...pnls).toFixed(1);
    document.getElementById('sWorst').textContent=Math.min(...pnls).toFixed(1);
    document.getElementById('sAvgBar').textContent=Math.round(trades.reduce((a,t)=>a+t.bars,0)/trades.length)+'K';
  }
  // update panel summary badge
  document.getElementById('panelSummary').textContent=
    trades.length?`${trades.length}筆 | PnL ${(totalPnl>=0?'+':'')+totalPnl.toFixed(0)}`:'';
}

// ── Markers ────────────────────────────────────────────────────────────────
function addMark(type){
  if(!vis)return;
  const label=selectedTag?type+':'+selectedTag:type;
  markers.push({idx:vis-1,type,label});
  const{slice,start}=getSlice();
  drawMarkers(slice,start,getScale(slice));
  sbMsg('📌 「'+label+'」@ K'+vis);
}
function clearMarks(){markers=[];mCtx.clearRect(0,0,mCanvas.width,mCanvas.height);sbMsg('已清除標記');}
function selTag(el,tag){
  if(selectedTag===tag){selectedTag=null;document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active'));}
  else{selectedTag=tag;document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active'));el.classList.add('active');}
}

// ── Indicators toggle ──────────────────────────────────────────────────────
function toggleInd(el){
  const type=el.dataset.type;
  if(type==='ma'){
    const p=el.dataset.p;
    const key='ma'+p;
    indOn[key]=!indOn[key];
    el.classList.toggle('off',!indOn[key]);
  }else if(type==='bb'){
    indOn.bb=!indOn.bb;
    el.classList.toggle('off',!indOn.bb);
    const s=document.getElementById('bbSettings');
    s.style.display=indOn.bb?'block':'none';
  }
  draw();
}

// ── Touch tap tooltip ──────────────────────────────────────────────────────
canvas.addEventListener('click',e=>{
  if(!candles.length||!vis)return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const my=(e.clientY-rect.top)*(canvas.height/rect.height);
  const{slice,start}=getSlice();
  const sc=getScale(slice);
  const{toX,xStep,W}=sc;
  let nearest=null,minD=9999;
  slice.forEach((_,i)=>{const d=Math.abs(toX(i)-mx);if(d<minD){minD=d;nearest=i;}});
  if(minD<xStep*1.3&&nearest!==null){
    const c=slice[nearest],isUp=c.c>=c.o;
    const tip=document.getElementById('tip');
    tip.innerHTML=`<span style="color:${isUp?'#00d4a0':'#ff4d6d'};font-weight:600;">${isUp?'▲':'▼'} K${start+nearest+1}</span><br>O <b>${c.o.toFixed(1)}</b>&nbsp;H <b style="color:#00d4a0">${c.h.toFixed(1)}</b><br>L <b style="color:#ff4d6d">${c.l.toFixed(1)}</b>&nbsp;C <b>${c.c.toFixed(1)}</b><br>振幅 <b>${(c.h-c.l).toFixed(1)}</b>`;
    let tx=toX(nearest)+12,ty=my-70;
    if(tx+130>W)tx=toX(nearest)-145;if(ty<0)ty=6;
    tip.style.left=tx+'px';tip.style.top=ty+'px';tip.style.display='block';
    clearTimeout(tip._t);tip._t=setTimeout(()=>tip.style.display='none',2800);
  }
});

// Desktop crosshair
canvas.addEventListener('mousemove',e=>{
  if(isMob()||!candles.length||!vis)return;
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const{slice,start}=getSlice();
  const sc=getScale(slice);
  const{toX,xStep,W,H,yMax,yMin,cH,pad}=sc;
  let nearest=null,minD=9999;
  slice.forEach((_,i)=>{const d=Math.abs(toX(i)-mx);if(d<minD){minD=d;nearest=i;}});
  if(minD<xStep&&nearest!==null){
    const c=slice[nearest],x=toX(nearest),isUp=c.c>=c.o;
    const tip=document.getElementById('tip');
    tip.innerHTML=`<span style="color:${isUp?'#00d4a0':'#ff4d6d'};font-weight:600;">${isUp?'▲':'▼'} K${start+nearest+1}</span><br>O <b>${c.o.toFixed(1)}</b>&nbsp;H <b style="color:#00d4a0">${c.h.toFixed(1)}</b><br>L <b style="color:#ff4d6d">${c.l.toFixed(1)}</b>&nbsp;C <b>${c.c.toFixed(1)}</b><br>振幅 <b>${(c.h-c.l).toFixed(1)}</b>`;
    let tx=x+12,ty=my-60;if(tx+130>W)tx=x-145;if(ty<0)ty=4;
    tip.style.left=tx+'px';tip.style.top=ty+'px';tip.style.display='block';
    draw();
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.setLineDash([3,3]);ctx.lineWidth=.8;
    ctx.beginPath();ctx.moveTo(x,pad.top);ctx.lineTo(x,H-pad.bottom);ctx.stroke();
    ctx.beginPath();ctx.moveTo(pad.left,my);ctx.lineTo(W-pad.right,my);ctx.stroke();
    ctx.setLineDash([]);
    const hovP=yMax-((my-pad.top)/cH)*(yMax-yMin);
    ctx.fillStyle='rgba(79,142,247,.8)';ctx.fillRect(W-pad.right+2,my-8,50,15);
    ctx.fillStyle='#fff';ctx.font='10px IBM Plex Mono,monospace';ctx.textAlign='left';
    ctx.fillText(hovP.toFixed(0),W-pad.right+5,my+3);
    ctx.restore();
  }else{document.getElementById('tip').style.display='none';draw();}
});
canvas.addEventListener('mouseleave',()=>{document.getElementById('tip').style.display='none';draw();});

// ── Keyboard ───────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='SELECT'||e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight')stepOne();
  if(e.code==='Equal'||e.code==='NumpadAdd'){e.preventDefault();setVis(vis_count-10);}
  if(e.code==='Minus'||e.code==='NumpadSubtract'){e.preventDefault();setVis(vis_count+10);}
  if(e.key==='l'||e.key==='L')openTrade('long');
  if(e.key==='s'||e.key==='S')openTrade('short');
  if(e.key==='x'||e.key==='X')closeTrade();
  if(e.key==='b'||e.key==='B')addMark('B');
  if(e.key==='n'||e.key==='N')newSession();
});

// ── Notify / status ────────────────────────────────────────────────────────
function notify(msg,type='info'){
  const el=document.getElementById('notif');
  el.textContent=msg;el.className=type+' show';
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2800);
}
function sbMsg(msg){document.getElementById('sbMsg').textContent=msg;}

// ── Init ───────────────────────────────────────────────────────────────────
window.addEventListener('resize',resize);
resize();
newSession();
setTimeout(()=>{
  if(!playing&&!pos)
    sbMsg(isMob()?'雙指縮放K線數 | 點K棒查看資訊':'滾輪縮放 | 空白=播放 →=+1K  =/- 調整K數  L/S=多空  X=平倉');
},3000);
</script>
